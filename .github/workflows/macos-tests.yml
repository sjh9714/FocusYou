name: macOS Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Cache Homebrew (XcodeGen)
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/xcodegen
            /usr/local/Cellar/xcodegen
          key: ${{ runner.os }}-homebrew-xcodegen-v1

      - name: Install XcodeGen
        run: |
          if ! brew list --versions xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          brew link xcodegen --overwrite --force
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          xcodegen --version

      - name: Validate QA Scripts
        run: |
          bash -n scripts/qa_focusyou_state.sh
          bash scripts/test_qa_focusyou_state.sh

      - name: Generate Project
        run: xcodegen generate

      - name: Run Unit Tests
        run: |
          xcodebuild \
            -project FocusYou.xcodeproj \
            -scheme FocusYou \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test
