name: FocusYou
options:
  bundleIdPrefix: com.sungjh
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.sungjh.focusyou
    MARKETING_VERSION: "2.3.9"
    CURRENT_PROJECT_VERSION: "31"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_CFBundleDisplayName: "Focus You"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_ENTITLEMENTS: FocusYou/FocusYou.entitlements
    DEVELOPMENT_TEAM: "9VRNY5PMG3"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_LANGUAGE: ko
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  FocusYou:
    type: application
    platform: macOS
    sources:
      - path: FocusYou
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: "Focus You"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "완료된 집중 세션을 Apple Calendar에 기록합니다."
    dependencies:
      - sdk: AppIntents.framework
      - target: FocusYouWidget
        embed: true
      - target: FocusYouNetworkExtension
        embed: true
  FocusYouNetworkExtension:
    type: system-extension
    platform: macOS
    sources:
      - path: FocusYouNetworkExtension
      - path: FocusYou/Services/Shared/SharedBlockingData.swift
      - path: FocusYou/Helpers/Constants.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sungjh.focusyou.network-extension
        PRODUCT_NAME: "FocusYouFilter"
        INFOPLIST_FILE: FocusYouNetworkExtension/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: FocusYouNetworkExtension/FocusYouNetworkExtension.entitlements
        DEVELOPMENT_TEAM: "9VRNY5PMG3"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - sdk: AppIntents.framework
      - sdk: NetworkExtension.framework
  FocusYouWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: FocusYouWidget
      - path: FocusYou/Services/Shared/SharedDataProvider.swift
      - path: FocusYou/Helpers/Constants.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sungjh.focusyou.widget
        PRODUCT_NAME: "FocusYouWidget"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Focus You Widget"
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ENTITLEMENTS: FocusYouWidget/FocusYouWidget.entitlements
        INFOPLIST_KEY_LSUIElement: ""
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
  FocusYouTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: FocusYouTests
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Focus You.app/Contents/MacOS/Focus You"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: FocusYou

schemes:
  FocusYou:
    build:
      targets:
        FocusYou: all
        FocusYouWidget: all
        FocusYouNetworkExtension: all
    run:
      storeKitConfiguration: FocusYou/FocusYou.storekit
    test:
      targets:
        - FocusYouTests
      storeKitConfiguration: FocusYou/FocusYou.storekit
